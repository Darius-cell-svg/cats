<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Котики</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: bounceIn 1s ease;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .cats-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            animation: slideInUp 0.5s ease;
            animation-fill-mode: both;
        }

        .cat-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .cat-card.favourite {
            border: 4px solid gold;
            position: relative;
        }

        .cat-card.favourite::before {
            content: "⭐ Любимец";
            position: absolute;
            top: 10px;
            right: 10px;
            background: gold;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 1;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .cat-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .cat-card:hover .cat-image {
            transform: scale(1.1);
        }

        .cat-info {
            padding: 20px;
            position: relative;
        }

        .cat-name {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cat-age {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .cat-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .cat-rating {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .star {
            color: #ddd;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .star.filled {
            color: gold;
            animation: starPop 0.3s ease;
        }

        @keyframes starPop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }

        .rating-value {
            margin-left: 10px;
            font-weight: bold;
            color: #764ba2;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cat-card:nth-child(1) { animation-delay: 0.1s; }
        .cat-card:nth-child(2) { animation-delay: 0.2s; }
        .cat-card:nth-child(3) { animation-delay: 0.3s; }
        .cat-card:nth-child(4) { animation-delay: 0.4s; }
        .cat-card:nth-child(5) { animation-delay: 0.5s; }
        .cat-card:nth-child(6) { animation-delay: 0.6s; }
        .cat-card:nth-child(7) { animation-delay: 0.7s; }
        .cat-card:nth-child(8) { animation-delay: 0.8s; }
        .cat-card:nth-child(9) { animation-delay: 0.9s; }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: white;
            color: #764ba2;
        }

        .stats {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 18px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <h1>🐱 Наши прекрасные котики 🐱</h1>
    
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">Все котики</button>
        <button class="filter-btn" data-filter="favourite">Любимчики ⭐</button>
        <button class="filter-btn" data-filter="high-rating">Топ рейтинг (10)</button>
    </div>

    <div class="cats-container" id="catsContainer"></div>
    
    <div class="stats" id="stats"></div>

    <script>
        const cats = [
            {
                "name": "Лара",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2021-09/167200DD-A44F-4845-8D4D-ACCFC180165A.jpeg",
                "age": 8,
                "rate": 7,
                "favourite": false,
                "description": "Лара – шотландская вислоухая, у нее остеохондродисплазия. Лара спокойная, очень ласковая и контактная. Болезнь не лечится и специального ухода не нужно.",
                "id": 1
            },
            {
                "name": "Базиль",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/064AEBCB-45EC-4CE7-AB13-C65F10F00B7B.jpeg",
                "age": 2,
                "rate": 10,
                "favourite": false,
                "description": "Внимательный, активный и ласковый. Любит играть, катать мяч, и мурчать на пледе рядом с людьми! Прилично воспитан, приучен к лотку. Вакцинирован, имеет ветеринарный паспорт.",
                "id": 2
            },
            {
                "name": "Риш",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/_DM34706.JPG",
                "age": 1,
                "rate": 10,
                "favourite": true,
                "description": "Риш любит лесенки, канаты. Очень активный и дружелюбный кот. Риш полностью здоров, привит, кастрирован. Использует лоточек и очень аккуратен.",
                "id": 3
            },
            {
                "name": "Элли",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/1_25.jpg",
                "age": 4,
                "rate": 8,
                "favourite": false,
                "description": "Элли обладает мягким и добрым характером. Очень любит всевозможные лакомства и вкусно покушать. Не доверяет людям, потребуется время, чтобы стать ей другом. Приучена к лотку и когтеточке",
                "id": 4
            },
            {
                "name": "Чарли",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/%D0%BB%D0%B5%D0%B2%D0%B83_%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg",
                "age": 1,
                "rate": 8,
                "favourite": false,
                "description": "Чёрно-белый юный котофилософ очень любит размышлять и быть наедине. Пока что не доверяет людям, не агрессивный. Ладит с другими животными, приучен к лотку и когтеточке",
                "id": 5
            },
            {
                "name": "Стефани",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/4_30.jpg",
                "age": 6,
                "rate": 9,
                "favourite": false,
                "description": "Прелестная Стефани – трогательная, добродушная и очень-очень общительная девочка как никто другой нуждается в заботе и любви. Приучена к лотку и когтеточке",
                "id": 6
            },
            {
                "name": "Дуся",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-02/B1444207-6EE3-4BA4-97F7-2F9666AE2F63.jpeg",
                "age": 1,
                "rate": 9,
                "favourite": false,
                "description": "Дусеньке около 1 года с небольшим, здорова, привита, стерилизована. Лоточек и когтеточку знает прекрасно. Очень общительная и нежная, хочет постоянного внимания.",
                "id": 7
            },
            {
                "name": "Бруно",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/IMG-20211223-WA0049.jpg",
                "age": 1,
                "rate": 10,
                "favourite": false,
                "description": "Очаровательный активный кот Бруно, находится в постоянном движении! Очаровательный и ласковый кот. Приучен к лотку, ладит с другими котами, привит.",
                "id": 8
            },
            {
                "name": "Светлячок",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/%D1%81%D0%B2%D0%B5%D1%82%D0%BB%D1%8F%D1%87%D0%BE%D0%BA4_%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg",
                "age": 1,
                "rate": 9,
                "favourite": true,
                "description": "Немного боязливый, но очень добрый и нежный кот Светлячок. Приучен к лотку и когтеточке, ладит с детьми, привит. Станет вам хорошим другом",
                "id": 9
            }
        ];

        const container = document.getElementById('catsContainer');
        const statsDiv = document.getElementById('stats');
        const filterButtons = document.querySelectorAll('.filter-btn');

        function createStars(rating) {
            let stars = '';
            for (let i = 1; i <= 10; i++) {
                stars += `<span class="star ${i <= rating ? 'filled' : ''}">★</span>`;
            }
            return stars;
        }

        function displayCats(filter = 'all') {
            let filteredCats = cats;
            
            if (filter === 'favourite') {
                filteredCats = cats.filter(cat => cat.favourite);
            } else if (filter === 'high-rating') {
                filteredCats = cats.filter(cat => cat.rate === 10);
            }

            container.innerHTML = filteredCats.map(cat => `
                <div class="cat-card ${cat.favourite ? 'favourite' : ''}">
                    <img src="${cat.img_link}" alt="${cat.name}" class="cat-image" onerror="this.src='https://via.placeholder.com/300x200?text=Фото+котика'">
                    <div class="cat-info">
                        <div class="cat-name">
                            ${cat.name}
                        </div>
                        <span class="cat-age">${cat.age} ${cat.age === 1 ? 'год' : cat.age < 5 ? 'года' : 'лет'}</span>
                        <p class="cat-description">${cat.description}</p>
                        <div class="cat-rating">
                            ${createStars(cat.rate)}
                            <span class="rating-value">(${cat.rate}/10)</span>
                        </div>
                    </div>
                </div>
            `).join('');

            const totalCats = filteredCats.length;
            const avgRating = (filteredCats.reduce((sum, cat) => sum + cat.rate, 0) / totalCats).toFixed(1);
            
            statsDiv.innerHTML = `
                Показано котиков: ${totalCats} | 
                Средний рейтинг: ${avgRating}/10
            `;
        }

        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                displayCats(button.dataset.filter);
            });
        });

        displayCats();

        document.querySelectorAll('.cat-card').forEach(card => {
            card.addEventListener('click', function() {
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 200);
            });
        });
    </script>
</body>
</html>
